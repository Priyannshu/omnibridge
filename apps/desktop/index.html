<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIBRIDGE v1.2.0-PRO | Terminal</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Slim draggable title bar -->
    <div id="titleBar">
        <span class="title-label">OMNIBRIDGE v1.2.0-PRO</span>
        <span class="title-status">
            <span class="status-dot" id="engineDot"></span>
            <span id="engineLabel">ENGINE IDLE</span>
        </span>
    </div>

    <!-- Terminal fills remaining space -->
    <div id="terminal">
        <!-- Scrollable output pane -->
        <div id="outputPane"></div>

        <!-- Fixed input bar -->
        <div id="inputBar">
            <span class="prompt">omni ❯</span>
            <input type="text" id="cmdInput" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off">
        </div>
    </div>

<script src="renderer.js"></script>
</body>

</html>
